name: Deploy Web UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'gitnexus-web/**'
      - 'gitnexus-shared/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            gitnexus-web/package-lock.json
            gitnexus-shared/package-lock.json

      - name: Build gitnexus-shared
        working-directory: gitnexus-shared
        shell: bash
        run: |
          for i in 1 2 3; do
            npm ci && npm run build && exit 0
            echo "Retry $i/3 failed for gitnexus-shared build; retrying..."
            sleep $((i * 5))
          done
          echo "::error::Failed to build gitnexus-shared after retries"
          exit 1

      - name: Build gitnexus-web
        working-directory: gitnexus-web
        shell: bash
        run: |
          for i in 1 2 3; do
            npm ci && npm run build && exit 0
            echo "Retry $i/3 failed for gitnexus-web build; retrying..."
            sleep $((i * 5))
          done
          echo "::error::Failed to build gitnexus-web after retries"
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gitnexus-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
