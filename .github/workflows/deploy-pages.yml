name: Deploy Web UI to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'gitnexus-web/**'
      - 'gitnexus-shared/**'
      - 'gitnexus/**'
      - '.github/workflows/deploy-pages.yml'
      - '.github/actions/**'
      - 'third_party/**'
      - 'config/uor-upstream.lock.json'
      - 'config/uor.gitnexusignore'
      - 'scripts/export-hosted-uor-graph.mjs'
      - 'scripts/uor-build-ontology.mjs'
      - 'scripts/uor-jsonld-ontology-terms.mjs'
      - 'scripts/uor-prepare.mjs'
      - 'scripts/verify-uor-lock.mjs'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-gitnexus
        with:
          build: 'true'

      - name: Verify UOR lock matches submodule
        run: node scripts/verify-uor-lock.mjs

      - name: Copy UOR GitNexus ignore template
        run: node scripts/uor-prepare.mjs

      - name: GitNexus analyze (UOR-Framework submodule)
        run: node gitnexus/dist/cli/index.js analyze third_party/UOR-Framework

      - name: Install Rust (UOR workspace — uor-build for canonical ontology-terms.json)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache UOR cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: third_party/UOR-Framework
          prefix-key: uor-framework-v1

      - name: Export hosted graph for static Pages
        run: node scripts/export-hosted-uor-graph.mjs

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gitnexus-web/package-lock.json

      - name: Build gitnexus-web
        working-directory: gitnexus-web
        shell: bash
        run: |
          for i in 1 2 3; do
            npm ci && npm run build && exit 0
            echo "Retry $i/3 failed for gitnexus-web build; retrying..."
            sleep $((i * 5))
          done
          echo "::error::Failed to build gitnexus-web after retries"
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gitnexus-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
