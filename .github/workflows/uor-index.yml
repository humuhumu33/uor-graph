name: UOR index

on:
  push:
    branches: [main]
    paths:
      - 'third_party/**'
      - '.gitmodules'
      - 'config/uor.gitnexusignore'
      - 'config/uor-upstream.lock.json'
      - 'scripts/uor-prepare.mjs'
      - 'scripts/sync-uor-lock.mjs'
      - 'scripts/verify-uor-lock.mjs'
      - 'scripts/uor-cargo-verify.mjs'
      - '.github/workflows/uor-index.yml'
  pull_request:
    branches: [main]
    paths:
      - 'third_party/**'
      - '.gitmodules'
      - 'config/uor.gitnexusignore'
      - 'config/uor-upstream.lock.json'
      - 'scripts/uor-prepare.mjs'
      - 'scripts/sync-uor-lock.mjs'
      - 'scripts/verify-uor-lock.mjs'
      - 'scripts/uor-cargo-verify.mjs'
      - '.github/workflows/uor-index.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: uor-index-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify lock matches submodule and canonical UOR remote
        run: node scripts/verify-uor-lock.mjs

      - name: Install Rust (UOR workspace rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cargo check UOR workspace (compiler gate)
        run: node scripts/uor-cargo-verify.mjs

      - uses: ./.github/actions/setup-gitnexus
        with:
          build: 'true'

      - name: Copy UOR GitNexus ignore template
        run: node scripts/uor-prepare.mjs

      - name: GitNexus analyze (UOR-Framework submodule)
        run: node gitnexus/dist/cli/index.js analyze third_party/UOR-Framework
