name: Setup GitNexus Web
description: Setup Node.js 22, build gitnexus-shared, install web dependencies

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: gitnexus-web/package-lock.json

    - name: Build gitnexus-shared
      run: |
        for i in 1 2 3; do
          npm ci && npm run build && exit 0
          echo "Retry $i/3 failed for gitnexus-shared build; retrying..."
          sleep $((i * 5))
        done
        echo "::error::Failed to build gitnexus-shared after retries"
        exit 1
      shell: bash
      working-directory: gitnexus-shared

    - name: Install web dependencies
      run: |
        for i in 1 2 3; do
          npm ci && exit 0
          echo "Retry $i/3 failed for gitnexus-web npm ci; retrying..."
          sleep $((i * 5))
        done
        echo "::error::Failed to install gitnexus-web dependencies after retries"
        exit 1
      shell: bash
      working-directory: gitnexus-web
