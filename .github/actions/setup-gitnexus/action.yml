name: Setup GitNexus
description: Setup Node.js 22, install dependencies, and optionally build

inputs:
  build:
    description: Whether to run npm run build after install
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: gitnexus/package-lock.json

    - name: Build gitnexus-shared
      run: |
        for i in 1 2 3; do
          npm ci && npm run build && exit 0
          echo "Retry $i/3 failed for gitnexus-shared build; retrying..."
          sleep $((i * 5))
        done
        echo "::error::Failed to build gitnexus-shared after retries"
        exit 1
      shell: bash
      working-directory: gitnexus-shared

    - name: Install dependencies
      run: |
        for i in 1 2 3; do
          npm ci && exit 0
          echo "Retry $i/3 failed for gitnexus npm ci; retrying..."
          sleep $((i * 5))
        done
        echo "::error::Failed to install gitnexus dependencies after retries"
        exit 1
      shell: bash
      working-directory: gitnexus

    - name: Build
      if: ${{ inputs.build == 'true' }}
      run: npm run build
      shell: bash
      working-directory: gitnexus
